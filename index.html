<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>WizeTravel — מכין את הטיסות שלך</title>
<link rel="preconnect" href="https://wizetravel-next.vercel.app">
<link rel="preconnect" href="https://ofirofir-wizetravel.hf.space" crossorigin>
<link rel="dns-prefetch" href="https://ofirofir-wizetravel.hf.space">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#030508;overflow:hidden;color:#eef2ff;font-family:'Inter',-apple-system,system-ui,sans-serif}
  /* The actual app — fills the screen, URL stays as travel.wizelife.ai */
  #app-frame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#030508;z-index:1}
</style>
</head>
<body>

<!-- Travel app loaded in an iframe so the URL stays branded -->
<iframe id="app-frame" src="" allow="clipboard-write; clipboard-read; geolocation"></iframe>

<script>
(function () {
  /* Wake the HF Space backend in the background — does not block the iframe. */
  try { fetch('https://ofirofir-wizetravel.hf.space/', { mode: 'no-cors', cache: 'no-cache' }).catch(function(){}); } catch (e) {}

  var TARGET = 'https://wizetravel-next.vercel.app/';
  var p = new URLSearchParams(location.search);
  var qs = new URLSearchParams();
  ['wl_token','wl_nick','wl_plan','lang'].forEach(function (k) {
    var v = p.get(k); if (v) qs.set(k, v);
  });
  var url = qs.toString() ? TARGET + '?' + qs.toString() : TARGET;
  document.getElementById('app-frame').src = url;
})();
</script>

<!-- WizeLife shared onboarding modal (only fires on first visit; closable) -->
<script>document.documentElement.setAttribute('data-wize-app', 'travel');</script>
<script src="https://wizelife.ai/js/wize-onboarding.js" defer></script>

</body>
</html>
