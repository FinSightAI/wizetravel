<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WizeTravel — מכין את הטיסות שלך</title>
<link rel="preconnect" href="https://nodedai.streamlit.app">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#030508}
body{font-family:'Inter',-apple-system,sans-serif;color:#eef2ff}

#app-frame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#030508;opacity:0;transition:opacity .4s ease;z-index:1}
#app-frame.ready{opacity:1}

#splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#030508;z-index:10;transition:opacity .4s ease}
#splash.hide{opacity:0;pointer-events:none}

.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.orb1{width:500px;height:500px;background:#3b82f6;top:-150px;left:-100px}
.orb2{width:400px;height:400px;background:#6366f1;bottom:-100px;right:-80px}
.orb3{width:300px;height:300px;background:#0ea5e9;top:50%;left:60%}

.card{position:relative;z-index:2;text-align:center;padding:20px;max-width:440px;width:100%}

.logo-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.logo-svg{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:900;font-size:24px;color:#fff;box-shadow:0 8px 32px rgba(59,130,246,.35)}
.logo-brand{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px}

.pulse-wrap{margin:0 auto 28px;position:relative;width:80px;height:80px}
.pulse-circle{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(59,130,246,.5);animation:pulse-ring 2s ease-out infinite}
.pulse-circle:nth-child(2){animation-delay:.5s}
.pulse-circle:nth-child(3){animation-delay:1s}
.pulse-inner{position:absolute;inset:15px;border-radius:50%;background:rgba(59,130,246,.15);display:flex;align-items:center;justify-content:center;font-size:24px}
@keyframes pulse-ring{0%{transform:scale(.6);opacity:1}100%{transform:scale(1.4);opacity:0}}

.title{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:800;margin-bottom:8px}
.subtitle{font-size:13px;color:#6b7280;margin-bottom:28px;line-height:1.6}

.prog-wrap{background:rgba(255,255,255,.06);border-radius:99px;height:4px;width:240px;margin:0 auto 10px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,#3b82f6,#6366f1);border-radius:99px;width:0%;transition:width .8s ease}
.prog-label{font-size:11px;color:#6b7280}
</style>
</head>
<body>

<iframe id="app-frame" allow="clipboard-write; clipboard-read"></iframe>

<div id="splash">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-svg">W</div>
      <div class="logo-brand">Wize<span style="background:linear-gradient(135deg,#3b82f6,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Travel</span></div>
    </div>
    <div class="pulse-wrap">
      <div class="pulse-circle"></div>
      <div class="pulse-circle"></div>
      <div class="pulse-circle"></div>
      <div class="pulse-inner">✈️</div>
    </div>
    <div class="title" id="status">מכין את הטיסות הכי טובות עבורך...</div>
    <div class="subtitle">השרת מתעורר — לוקח עד 30 שניות בטעינה ראשונה</div>
    <div class="prog-wrap"><div class="prog-bar" id="bar"></div></div>
    <div class="prog-label" id="prog-label">0%</div>
  </div>
</div>

<script>
const TARGET = 'https://nodedai.streamlit.app';
const params = new URLSearchParams(window.location.search);
const wlToken = params.get('wl_token');
const wlNick = params.get('wl_nick');

let iframeUrl = TARGET;
const qs = new URLSearchParams();
if (wlToken) qs.set('wl_token', wlToken);
if (wlNick) qs.set('wl_nick', wlNick);
const qsStr = qs.toString();
if (qsStr) iframeUrl += '/?' + qsStr;

const iframe = document.getElementById('app-frame');
const splash = document.getElementById('splash');
const bar = document.getElementById('bar');
const progLabel = document.getElementById('prog-label');
const status = document.getElementById('status');

let progress = 0;
const startTime = Date.now();
const STATUSES = [
  'מכין את הטיסות הכי טובות עבורך...',
  'סורק מסלולים פופולריים...',
  'מנתח מגמות מחירים...',
  'מאחזר הצעות מחיר...',
  'כמעט מוכן...'
];
let statusIdx = 0;

function updateProgress() {
  const elapsed = Date.now() - startTime;
  progress = Math.min(95, (elapsed / 30000) * 100);
  bar.style.width = progress + '%';
  progLabel.textContent = Math.round(progress) + '%';
  const newIdx = Math.min(Math.floor((elapsed / 30000) * STATUSES.length), STATUSES.length - 1);
  if (newIdx !== statusIdx) {
    statusIdx = newIdx;
    status.textContent = STATUSES[statusIdx];
  }
}
const progInterval = setInterval(updateProgress, 600);

let loaded = false;
function loadFrame() {
  if (loaded) return;
  loaded = true;
  iframe.src = iframeUrl;
  iframe.onload = () => {
    bar.style.width = '100%';
    progLabel.textContent = '100%';
    status.textContent = '✓ מוכן';
    setTimeout(() => {
      iframe.classList.add('ready');
      splash.classList.add('hide');
      clearInterval(progInterval);
    }, 200);
  };
}

function ping() {
  fetch(TARGET + '/_stcore/health', { method: 'GET', mode: 'no-cors' })
    .then(() => loadFrame())
    .catch(() => {});
}
setInterval(ping, 3000);
ping();

setTimeout(loadFrame, 8000);
</script>
</body>
</html>
